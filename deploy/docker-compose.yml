services:
  daemon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python3 -m strategies.crypto.daemon
    restart: always
    volumes:
      - microstructure-data:/app/data
    environment:
      - KRAKEN_SYMBOLS=${KRAKEN_SYMBOLS:-BTC,ETH}
      - KRAKEN_BOOK_DEPTH=${KRAKEN_BOOK_DEPTH:-10}
      - SNAPSHOT_QUEUE_SIZE=${SNAPSHOT_QUEUE_SIZE:-5000}
      - L2_PERSIST_JSONL=${L2_PERSIST_JSONL:-true}
      - L2_JSONL_OUTPUT_DIR=/app/data/l2

volumes:
  microstructure-data:
    driver: local
